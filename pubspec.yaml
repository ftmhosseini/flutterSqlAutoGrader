name: sql_auto_grader
description: "SQL Auto Grader Flutter App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0-320.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  go_router: ^14.3.0
  provider: ^6.1.2
  url_launcher: ^6.3.0
  http: ^1.2.0
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
